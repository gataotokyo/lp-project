<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">

    <!-- SEO & OGP Meta Tags -->
    <link rel="canonical" href="{{canonical}}">
    <meta property="og:title" content="{{og_title}}">
    <meta property="og:description" content="{{og_description}}">
    <meta property="og:image" content="{{og_image}}">
    <meta property="og:url" content="{{og_url}}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="東京ボードゲーム会">
    <meta property="og:locale" content="ja_JP">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{twitter_title}}">
    <meta name="twitter:description" content="{{twitter_description}}">
    <meta name="twitter:image" content="{{twitter_image}}">

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/images/favicon_32.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon_192.png?v=2">
    <link rel="apple-touch-icon" href="/images/apple_touch_icon_180.png?v=2">

    <!-- Google Fonts: Inter/Outfit for headings & Noto Sans JP for readability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">

    <!-- Dynamic Structured Data (JSON-LD) -->
    {{json_ld}}
</head>

<body>

    <div class="app-container">
        <!-- Top Fixed Header -->
        <header class="site-header" id="site-header">
            <div class="header-inner">
                <a href="/" class="header-brand">
                    <img src="/images/tokyo_logo_horizontal.png?v=2" alt="東京ボードゲーム会" class="header-logo">
                </a>

                <nav class="header-nav">
                    <ul>
                        <li><a href="/" class="nav-item" id="nav-home">ホーム</a></li>

                        <li><a href="/about/" class="nav-item" id="nav-about">プロフィール</a></li>
                        <li><a href="/gallery/" class="nav-item" id="nav-gallery">フォトギャラリー</a></li>
                        <li><a href="/blog/" class="nav-item" id="nav-blog">お役立ちコラム</a></li>
                        <li><a href="/reservation/" class="nav-item nav-cta" id="nav-reservation">日程・予約</a></li>
                    </ul>
                </nav>

                <div class="header-right">
                    <div class="header-sns">
                        <!-- X Icon -->

                            class="sns-link" aria-label="X (Twitter)">

                            target="_blank" rel="noopener noreferrer" class="sns-link" aria-label="Instagram">
                            <svg class="sns-icon" viewBox="0 0 24 24">
                                <path fill="currentColor"

            </div>
        </header>

        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            {{content}}
        </main>

        <!-- Common Footer -->
        <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-brand">
                    <img src="/images/tokyo_logo_mono.png?v=2" alt="東京ボードゲーム会" class="footer-mono-logo">

                <nav class="footer-nav">
                    <ul>

                            <path fill="currentColor"

</html>
